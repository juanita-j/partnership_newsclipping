<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>파트너사 뉴스 클리핑 {{ date }}</title>
  <style>
    body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; line-height: 1.5; color: #222; max-width: 720px; margin: 0 auto; padding: 16px; }
    h1 { font-size: 1.25rem; border-bottom: 1px solid #ddd; padding-bottom: 8px; }
    h2 { font-size: 1.1rem; margin-top: 20px; margin-bottom: 8px; color: #333; }
    ul { list-style: none; padding-left: 0; margin: 0; }
    li { margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #eee; }
    li:last-child { border-bottom: none; }
    a { color: #1a73e8; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .summary { color: #444; font-size: 0.95rem; white-space: pre-line; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>파트너사 뉴스 클리핑 ({{ date }})</h1>
  {% for partner_id, pairs in grouped.items() %}
  <h2>{{ display_names.get(partner_id) or partner_id }}</h2>
  <ul>
    {% for article, summary in pairs %}
    <li>
      <a href="{{ article.url }}">{{ article.title }}</a>
      <div class="summary">{{ summary }}</div>
    </li>
    {% endfor %}
  </ul>
  {% endfor %}
</body>
</html>
