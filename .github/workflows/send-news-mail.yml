# 1시간마다 발송 (KST 09:05~19:05, 11회) — 직전 1시간 구간 기사만 포함
# 푸시 즉시 적용: 당일 남은 회차부터 스케줄 실행 (다음날부터 아님)
# 필수 Secrets: GMAIL_APP_PASSWORD, NAVER_CLIENT_ID, NAVER_CLIENT_SECRET, OPENAI_API_KEY

name: Send News Mail

on:
  schedule:
    # KST 9시~19시 매시 5분 (정각 부하 회피). UTC: 0~10시 5분. 푸시 후 당일 남은 시각부터 실행
    - cron: '5 0 * * *'
    - cron: '5 1 * * *'
    - cron: '5 2 * * *'
    - cron: '5 3 * * *'
    - cron: '5 4 * * *'
    - cron: '5 5 * * *'
    - cron: '5 6 * * *'
    - cron: '5 7 * * *'
    - cron: '5 8 * * *'
    - cron: '5 9 * * *'
    - cron: '5 10 * * *'
  # 수시 발송: "Run workflow" 클릭 → 당일 00:00 KST~요청 시각 기사로 메일 발송
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-mail:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
      GMAIL_TO: ${{ secrets.GMAIL_TO }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install python-dotenv

      - name: Collect news (Naver API)
        run: |
          echo "github.event_name=${{ github.event_name }}"
          echo "REQUEST_SCOPE=${{ github.event_name == 'workflow_dispatch' && 'today' || 'scheduled' }}"
          python send_exec_news_timed.py
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          TZ: Asia/Seoul
          FETCH_ARTICLE_BODY: "1"
          # workflow_dispatch → 당일 00:00~현재 전체 수집. schedule → 직전 업데이트 이후만 수집
          REQUEST_SCOPE: ${{ github.event_name == 'workflow_dispatch' && 'today' || 'scheduled' }}

      - name: Summarize with LLM
        run: python summarize_exec_news_llm.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # OPENAI_MODEL: gpt-4o-mini  # 기본값

      - name: Send mail (Gmail)
        run: python send_email_from_json.py
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}

      - name: Set archive cache key (KST year-month)
        run: echo "YM=$(TZ=Asia/Seoul date +%Y-%m)" >> $GITHUB_ENV

      - name: Restore monthly archive cache
        uses: actions/cache@v4
        with:
          path: .monthly_archives
          key: monthly-archives-${{ runner.os }}-${{ env.YM }}

      - name: Archive daily summary to monthly
        run: python archive_monthly_items.py
