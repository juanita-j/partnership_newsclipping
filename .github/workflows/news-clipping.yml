name: Partner News Clipping
on:
  # 코드·설정 수정 시 자동 발송하지 않음. 수동 실행(workflow_dispatch) 또는 아래 스케줄로만 실행.
  schedule:
    # 매주 월·수·금 15:00 KST (= UTC 06:00). GitHub cron은 UTC 기준, 1=월 3=수 5=금
    - cron: '0 6 * * 1,3,5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # 이벤트가 가리키는 커밋(SHA)을 그대로 체크아웃 (푸시/수동 실행 모두 최신 코드 보장)
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: data 디렉터리 준비
        run: mkdir -p data

      # Actions 러너는 매번 초기화되므로 직전 발송 시각을 캐시로 넘김 → 이전 발송 이후 기사만 수집
      - name: 직전 발송 시각 복원 (캐시)
        uses: actions/cache@v4
        with:
          path: data/last_send_at.txt
          key: partner-newsclip-last-send-v1

      - name: Show commit (실행 중인 코드 확인)
        run: |
          git log -1 --oneline
          echo "--- run_batch.py에 dedup 반영 여부 ---"
          grep -n "dedup_articles" run_batch.py || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 필터 모듈 검증 (제외 키워드가 CI 코드에 포함되는지)
        run: |
          python -c "from filters.keyword_filter import EXCLUDE_KEYWORDS, EXCLUDE_TITLE_KEYWORDS; must=['신규 매장 오픈','브랜드파워','CJ온스타일','CJ올리브네트웍스','LS네트웍스','LS전선','금호현대','휴맥스','삼성바이오로직스']; missing=[x for x in must if x not in EXCLUDE_KEYWORDS]; assert not missing, 'Missing: '+str(missing); must_t=['주주총회','베스트샵','시가총액']; missing_t=[x for x in must_t if x not in EXCLUDE_TITLE_KEYWORDS]; assert not missing_t, 'Missing title: '+str(missing_t); print('OK exclude=', len(EXCLUDE_KEYWORDS), 'title-only=', len(EXCLUDE_TITLE_KEYWORDS))"

      - name: Run batch
        env:
          MAX_ARTICLES_TO_SUMMARIZE: "200"
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          # LLM 요약: OPENAI_API_KEY 또는 ANTHROPIC_API_KEY (config/summarizer.yaml의 provider와 맞출 것)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SENDER_FROM: ${{ secrets.SENDER_FROM }}
          SENDER_TO: ${{ secrets.SENDER_TO }}
        run: python run_batch.py
