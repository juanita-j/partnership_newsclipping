name: Partner News Clipping
on:
  schedule:
    # KST 15:00 = UTC 06:00, 월/수/금
    - cron: '0 6 * * 1,3,5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run batch
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          # LLM 요약: OPENAI_API_KEY 또는 ANTHROPIC_API_KEY (config/summarizer.yaml의 provider와 맞출 것)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SENDER_FROM: ${{ secrets.SENDER_FROM }}
          SENDER_TO: ${{ secrets.SENDER_TO }}
        run: python run_batch.py
