# 매월 마지막 주 금요일 KST 09:00에 월간 인사변동 브리핑 메일 발송
# cron: 매주 금요일 00:00 UTC = KST 09:00. 스크립트 내부에서 "해당 월 마지막 금요일" 여부 검사 후 발송
# 필수 Secrets: GMAIL_APP_PASSWORD, GMAIL_SENDER, GMAIL_TO

name: Send Monthly Briefing

on:
  schedule:
    - cron: '0 0 * * 5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monthly-briefing:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
      GMAIL_TO: ${{ secrets.GMAIL_TO }}
      # 수동 실행 시 마지막 금요일 체크 무시하고 발송
      FORCE_SEND_MONTHLY: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set archive cache key (KST year-month)
        run: echo "YM=$(TZ=Asia/Seoul date +%Y-%m)" >> $GITHUB_ENV

      - name: Restore monthly archive cache
        uses: actions/cache@v4
        with:
          path: .monthly_archives
          key: monthly-archives-${{ runner.os }}-${{ env.YM }}

      - name: Send monthly digest (last Friday only)
        run: python send_monthly_digest.py
