# 회사명(검색어)은 들어가나, 실제 그룹/계열사 사업과 무관한 기사 제외
# 로직: noise_title_patterns 중 하나가 제목에 매칭되고,
#       business_anchors 중 어느 것도 제목+본문 앞부분에 없으면 제외
#
# 네이버 검색은 부분 일치라 지역 병원·개인 상호명에 '삼성''LG' 등이 붙은 경우가 많음

samsung:
  noise_title_patterns:
    - '삼성365'
    - '삼성\d+정형외과'
    - '삼성.*정형외과'
    - '삼성.*치과'
    - '삼성.*한의원'
    - '삼성.*의원'
    - '동탄삼성'
    - '[가-힣]{1,8}삼성\d{3}'
  business_anchors:
    - 삼성전자
    - 삼성SDS
    - Samsung
    - 갤럭시
    - 삼성전기
    - 삼성디스플레이
    - 삼성바이오
    - 삼성물산
    - 삼성생명
    - 삼성화재
    - 삼성증권
    - 삼성에피스
    - 삼성그룹
    - 삼성서울병원
    - 삼성의료원
    - HARMAN
    - 하만
    - 반도체
    - 파운드리

