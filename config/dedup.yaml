# 유사 기사 중복 제거(dedup) 설정

# 1차 휴리스틱: 제목 토큰 겹침 기준 (이 이상이어야 LLM 후보로 전달)
# 0.0 ~ 1.0, Jaccard 유사도. 낮을수록 더 많은 후보 → LLM 호출 증가
title_jaccard_threshold: 0.15

# Near-duplicate 판별에 LLM 사용 여부 (false면 휴리스틱만 사용, 그룹핑 없음)
use_llm_near_duplicate: true

# LLM 호출 배치 크기 (한 번에 N쌍 판별 시 요청당 쌍 수)
llm_batch_pairs: 5

# 대표 기사 선택: 정보량 점수 = title_len + summary_len, 동점 시 published_at 빠른 쪽
# (추가 옵션 없음, 코드에서 고정)

# 디버그 로그: 그룹/대표 선택 로그 출력 여부
debug_log: true
