# 유사 기사 중복 제거(dedup) 설정

# 휴리스틱: 제목+요약+본문 앞 N자를 합쳐 토큰 Jaccard (이 값 이상이면 LLM 후보)
# 제목만 다르고 본문이 같은 사건(예: 메타-마누스-중국)도 잡기 위해 본문 일부 포함
title_jaccard_threshold: 0.10
heuristic_body_chars: 1600

# OpenAI 임베딩으로 추가 후보 (제목 Jaccard에 안 걸려도 본문 의미가 비슷하면 후보)
use_embedding_candidates: true
embedding_similarity_threshold: 0.78

# Near-duplicate 최종 판별: LLM에 제목·요약·본문 발췌 전달
use_llm_near_duplicate: true
# 배치당 쌍 수 (본문 발췌가 길어져 기본 3 권장)
llm_batch_pairs: 3

# 디버그 로그
debug_log: true
